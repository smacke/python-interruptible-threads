name: interruptible-threading

on: [push, pull_request, workflow_dispatch]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ 'ubuntu-22.04' ]
        python-version: [ '3.9', '3.10', '3.11', '3.12', '3.13' ]
        include:
          - python-version: '3.9'
            os: 'macos-15-intel'
          - python-version: '3.11'
            os: 'macos-latest'
          - python-version: '3.13'
            os: 'macos-latest'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]
    - name: Lint with ruff
      run: make lint
    - name: Run typechecking with mypy and unit tests with pytest (skip coverage)
      if: ${{ matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel' }}
      run: |
        make typecheck
        pytest
    - name: Run typechecking with mypy and unit tests with pytest (including coverage)
      if: matrix.os == 'ubuntu-22.04'
      run: make check_ci
